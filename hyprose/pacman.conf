#
# /etc/pacman.conf — Hyprose ISO pacman config
#

[options]
HoldPkg      = pacman glibc
Architecture = auto

Color
ILoveCandy
CheckSpace
VerbosePkgLists
ParallelDownloads = 8

# Always use --noconfirm in automated builds to avoid interactive prompts
# SigLevel and LocalFileSigLevel prevent signature validation issues with AUR
SigLevel    = Required DatabaseOptional
LocalFileSigLevel = Optional

[core]
Include = /etc/pacman.d/mirrorlist

[extra]
Include = /etc/pacman.d/mirrorlist

[multilib]
Include = /etc/pacman.d/mirrorlist

# -------------------------------------------------------
# Chaotic AUR — bleeding-edge AUR packages pre-built
# To import keys manually on a fresh Arch install:
#   sudo pacman-key --recv-key 3056513887B78AEB --keyserver keyserver.ubuntu.com
#   sudo pacman-key --lsign-key 3056513887B78AEB
#   sudo pacman -U 'https://cdn-mirror.chaotic.cx/chaotic-aur/chaotic-keyring.pkg.tar.zst'
#   sudo pacman -U 'https://cdn-mirror.chaotic.cx/chaotic-aur/chaotic-mirrorlist.pkg.tar.zst'
# -------------------------------------------------------
[chaotic-aur]
Include = /etc/pacman.d/chaotic-mirrorlist

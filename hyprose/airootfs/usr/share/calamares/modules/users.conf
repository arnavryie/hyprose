---
# User configuration
userName: "user"
userNamePlaceholder: "username"
userNameTooltip: "Your login username (lowercase, no spaces)"

hostName: "hyprose"
hostNamePlaceholder: "hostname"
hostNameTooltip: "Computer name on the network"

fullName: "Hyprose User"
fullNamePlaceholder: "Full Name"
fullNameTooltip: "Your display name"

loginNamePlaceholder: "Username"
loginNameTooltip: "Username for login"

passwordPlaceholder: "Password"
passwordTooltip: "Choose a strong password"

rootPasswordPlaceholder: "Root Password"
rootPasswordTooltip: "Administrator password (leave blank to use user password)"

userGroup:      users
sudoersGroup:   wheel
sudoersWheel:   true

# Require strong passwords
passwordRequirements:
    minLength: 1
    maxLength: 128

---
# Partition configuration
partitionLayoutLabel: "Disk Partitioning"
partitionPageExplanation: |
    <p>Select how you want to install Hyprose:</p>
    <p><b>Erase Disk:</b> Wipes the entire disk and installs Hyprose (recommended)</p>
    <p><b>Manual:</b> Advanced partitioning for dual-boot or custom layouts</p>

initialPartitioningChoice: "erase"
availablePartitioningChoices:
    - id: "erase"
      label: "Erase Disk"
      description: "Erase entire disk and install Hyprose"
    - id: "manual"
      label: "Manual Partitioning"
      description: "Create partitions manually"

# Default partition scheme for erase mode
erase:
    mountPoint: "/"
    fsType: "ext4"
    size: "100%"

# EFI partition settings
ebi:
    mountPoint: "/boot/efi"
    fsType: "fat32"
    size: "512MiB"
    flags: [ "boot" ]

# Swap settings
swap:
    fsType: "linuxswap"
    size: "4096MiB"

# Don't allow alongside (Windows dual-boot) for simplicity
allowAlongside: false

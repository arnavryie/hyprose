---
# Shell process — runs after filesystem unpack
# This is where we install Hyprland, end-4 dots, and configure everything

timeout: 1800  # 30 minutes max

script: |
    #!/bin/bash
    set -e

    # Get install root from Calamares
    ROOT="${CALAMARES_CHROOT}"
    USER="${CALAMARES_USER_NAME}"
    HOSTNAME="${CALAMARES_HOST_NAME}"

    echo "========================================"
    echo "  🌹 Hyprose Post-Install Setup"
    echo "========================================"

    # --- BASE CONFIGURATION ---
    # Timezone
    ln -sf /usr/share/zoneinfo/UTC "${ROOT}/etc/localtime"
    arch-chroot "${ROOT}" hwclock --systohc

    # Locale
    sed -i 's/#en_US.UTF-8/en_US.UTF-8/' "${ROOT}/etc/locale.gen"
    arch-chroot "${ROOT}" locale-gen
    echo "LANG=en_US.UTF-8" > "${ROOT}/etc/locale.conf"

    # Hosts
    echo "${HOSTNAME}" > "${ROOT}/etc/hostname"
    cat > "${ROOT}/etc/hosts" <<EOF
127.0.0.1   localhost
::1         localhost
127.0.1.1   ${HOSTNAME}.localdomain ${HOSTNAME}
EOF

    # --- ENABLE SERVICES ---
    arch-chroot "${ROOT}" systemctl enable NetworkManager
    arch-chroot "${ROOT}" systemctl enable bluetooth
    arch-chroot "${ROOT}" systemctl enable fstrim.timer
    arch-chroot "${ROOT}" systemctl enable paccache.timer

    # --- CHAOTIC AUR SETUP ---
    arch-chroot "${ROOT}" bash -c '
        pacman-key --recv-key 3056513887B78AEB --keyserver keyserver.ubuntu.com
        pacman-key --lsign-key 3056513887B78AEB
        pacman -U --noconfirm "https://cdn-mirror.chaotic.cx/chaotic-aur/chaotic-keyring.pkg.tar.zst"
        pacman -U --noconfirm "https://cdn-mirror.chaotic.cx/chaotic-aur/chaotic-mirrorlist.pkg.tar.zst"
    '

    if ! grep -q "chaotic-aur" "${ROOT}/etc/pacman.conf"; then
        cat >> "${ROOT}/etc/pacman.conf" <<'PACMAN'

[chaotic-aur]
Include = /etc/pacman.d/chaotic-mirrorlist
PACMAN
    fi

    arch-chroot "${ROOT}" pacman -Sy

    # --- INSTALL HYPRLAND ECOSYSTEM ---
    arch-chroot "${ROOT}" pacman -S --noconfirm         hyprland hyprcursor hyprutils hyprgraphics hyprlang hypridle hyprlock hyprpaper         xdg-desktop-portal-hyprland

    # --- INSTALL QUICKSHELL ---
    arch-chroot "${ROOT}" pacman -S --noconfirm         quickshell qt6-base qt6-declarative qt6-wayland qt6-5compat qt6-svg         qt6-multimedia qt6-charts qt6-graphs qt6-quick3d

    # --- INSTALL UTILITIES ---
    arch-chroot "${ROOT}" pacman -S --noconfirm         kitty fish zsh fuzzel wlogout mako libnotify         nautilus nautilus-open-any-terminal         imagemagick ffmpeg ffmpegthumbnailer         ttf-jetbrains-mono-nerd ttf-space-mono-nerd         bibata-cursor-theme papirus-icon-theme adw-gtk-theme nwg-look         gtk3 gtk4 qt5ct qt6ct kvantum kvantum-qt5

    # --- PYTHON & AI DEPS ---
    arch-chroot "${ROOT}" pacman -S --noconfirm         python python-pip python-gobject python-materialyoucolor python-pillow         python-pywalfox python-requests python-numpy python-scipy python-pyaudio         python-gtts python-pytesseract python-pyperclip python-screeninfo         python-setproctitle python-tqdm python-watchdog python-psutil

    # --- AUR HELPERS ---
    arch-chroot "${ROOT}" pacman -S --noconfirm yay paru

    # --- GPU DETECTION & DRIVERS ---
    GPU_INFO=$(lspci | grep -i vga || true)

    if echo "${GPU_INFO}" | grep -qi nvidia; then
        echo "NVIDIA GPU detected — installing proprietary drivers..."
        arch-chroot "${ROOT}" pacman -S --noconfirm nvidia-dkms nvidia-utils nvidia-settings
        sed -i 's/GRUB_CMDLINE_LINUX_DEFAULT="/GRUB_CMDLINE_LINUX_DEFAULT="nvidia-drm.modeset=1 /' "${ROOT}/etc/default/grub"
    elif echo "${GPU_INFO}" | grep -qi amd; then
        echo "AMD GPU detected — installing Mesa drivers..."
        arch-chroot "${ROOT}" pacman -S --noconfirm mesa vulkan-radeon libva-mesa-driver
    elif echo "${GPU_INFO}" | grep -qi intel; then
        echo "Intel GPU detected — installing drivers..."
        arch-chroot "${ROOT}" pacman -S --noconfirm mesa vulkan-intel intel-media-driver
    fi

    # --- INSTALL END-4 DOTFILES ---
    echo "Installing end-4 dots-hyprland..."

    # Clone as the new user
    arch-chroot "${ROOT}" su - "${USER}" -c '
        cd /tmp
        rm -rf dots-hyprland
        git clone --depth 1 https://github.com/end-4/dots-hyprland.git
        cd dots-hyprland
        export II_TRANSPARENT=1
        ./setup.sh install
    '

    # --- SET UP AUTOSTART ---
    # TTY1 autostart for Hyprland (clean, no display manager needed)
    cat > "${ROOT}/home/${USER}/.bash_profile" <<'BASH'
if [ -z "$DISPLAY" ] && [ "$(tty)" = "/dev/tty1" ]; then
    export XDG_SESSION_TYPE=wayland
    export XDG_CURRENT_DESKTOP=Hyprland
    export XDG_SESSION_DESKTOP=Hyprland
    export MOZ_ENABLE_WAYLAND=1
    export QT_QPA_PLATFORM=wayland
    export SDL_VIDEODRIVER=wayland
    export _JAVA_AWT_WM_NONREPARENTING=1
    exec Hyprland
fi
BASH

    # Fish config
    mkdir -p "${ROOT}/home/${USER}/.config/fish"
    cat > "${ROOT}/home/${USER}/.config/fish/config.fish" <<'FISH'
if status is-interactive
    # Hyprose fish config
    set -x XDG_SESSION_TYPE wayland
    set -x XDG_CURRENT_DESKTOP Hyprland
    set -x MOZ_ENABLE_WAYLAND 1
    set -x QT_QPA_PLATFORM wayland
end
FISH

    # --- WALLPAPERS ---
    mkdir -p "${ROOT}/home/${USER}/Wallpapers"
    if [ -d "${ROOT}/usr/local/share/backgrounds/hyprose" ]; then
        cp "${ROOT}/usr/local/share/backgrounds/hyprose/"* "${ROOT}/home/${USER}/Wallpapers/" 2>/dev/null || true
    fi

    # --- FIX PERMISSIONS ---
    arch-chroot "${ROOT}" chown -R "${USER}:${USER}" "/home/${USER}"

    # --- FIRST BOOT SERVICE ---
    cat > "${ROOT}/usr/local/bin/hyprose-first-boot" <<'FIRSTBOOT'
#!/bin/bash
# Hyprose First Boot — runs once after installation

USER=$(ls /home | head -1)

# Generate colors from wallpaper
if [ -x "/home/${USER}/.config/hypr/scripts/wallpaper.sh" ]; then
    su - "${USER}" -c "~/.config/hypr/scripts/wallpaper.sh" || true
fi

# Welcome notification
if command -v notify-send &>/dev/null; then
    su - "${USER}" -c "notify-send 'Welcome to Hyprose!' 'Your Hyprland rice is ready. Press Super+/ for keybinds.'" || true
fi

# Disable this service
systemctl disable hyprose-first-boot.service
rm -f /etc/systemd/system/hyprose-first-boot.service
FIRSTBOOT

    chmod +x "${ROOT}/usr/local/bin/hyprose-first-boot"

    cat > "${ROOT}/etc/systemd/system/hyprose-first-boot.service" <<'SERVICE'
[Unit]
Description=Hyprose First Boot Setup
After=network.target

[Service]
Type=oneshot
ExecStart=/usr/local/bin/hyprose-first-boot
RemainAfterExit=yes

[Install]
WantedBy=multi-user.target
SERVICE

    arch-chroot "${ROOT}" systemctl enable hyprose-first-boot.service

    # --- GRUB CONFIG ---
    arch-chroot "${ROOT}" grub-mkconfig -o /boot/grub/grub.cfg

    echo "========================================"
    echo "  ✅ Hyprose setup complete!"
    echo "========================================"

name: Build Hyprose ISO

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    name: Build ISO
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel
      options: --privileged
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare pacman + Chaotic AUR keyring
        run: |
          pacman-key --init
          pacman -Sy --noconfirm archlinux-keyring
          pacman-key --populate archlinux
          pacman-key --recv-key 3056513887B78AEB --keyserver keyserver.ubuntu.com
          pacman-key --lsign-key 3056513887B78AEB
          pacman -U --noconfirm \
            'https://cdn-mirror.chaotic.cx/chaotic-aur/chaotic-keyring.pkg.tar.zst' \
            'https://cdn-mirror.chaotic.cx/chaotic-aur/chaotic-mirrorlist.pkg.tar.zst'

      - name: Install build tools
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm archiso git rsync

      - name: Setup Chaotic AUR
        run: |
          pacman-key --init
          pacman-key --recv-key 3056513887B78AEB --keyserver keyserver.ubuntu.com
          pacman-key --lsign-key 3056513887B78AEB
          pacman -U --noconfirm 'https://cdn-mirror.chaotic.cx/chaotic-aur/chaotic-keyring.pkg.tar.zst'
          pacman -U --noconfirm 'https://cdn-mirror.chaotic.cx/chaotic-aur/chaotic-mirrorlist.pkg.tar.zst'

      - name: Vendor hyprose-dots into airootfs
        run: |
          git clone --depth=1 --recurse-submodules \
            https://github.com/arnavryie/hyprose-dots.git /tmp/hyprose-dots
          mkdir -p hyprose/airootfs/etc/skel
          rsync -a /tmp/hyprose-dots/dots/ hyprose/airootfs/etc/skel/
          mkdir -p hyprose/airootfs/usr/share/hyprose
          rsync -a --exclude='.git' /tmp/hyprose-dots/ hyprose/airootfs/usr/share/hyprose/dots/

      - name: Build ISO
        env:
          TERM: xterm
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: hyprose-iso
          path: |
            out/*.iso
            out/*.sha256
          if-no-files-found: error
          retention-days: 7
